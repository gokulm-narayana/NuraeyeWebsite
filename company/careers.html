<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers | NuraEye Systems</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome for mobile menu icon & other icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../index.css">
    <script src="../js/components.js"></script>
</head>

<body>

    <!-- Header Section -->
    <!-- Header Component -->
    <app-header base-path=".."></app-header>

    <main>
        <section class="section" style="padding-top: 7rem; position: relative; overflow: hidden;">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>
            <div class="container" style="max-width: 800px;">
                <div class="section-header text-center">

                    <h1 class="section-title">Careers</h1>
                    <p style="color: var(--logo-blue); font-size: 1.25rem; font-weight: 500; margin-top: 1rem;">
                        Redefining the future of security—together.</p>
                </div>

                <!-- Careers -->
                <div class="careers-section glass-panel">
                    <h4
                        style="font-size: 1.25rem; margin-bottom: 1.5rem; color: var(--text-pure); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
                        Current Openings</h4>
                    <ul class="jobs-list">
                        <li class="job-item">
                            <span class="job-role" style="font-size: 1.15rem;">Backend Engineer (AI/ML)</span>
                            <span class="job-openings badge">2 Openings</span>
                        </li>
                        <li class="job-item">
                            <span class="job-role" style="font-size: 1.15rem;">CCTV Installation Technician</span>
                            <span class="job-openings badge">5 Openings</span>
                        </li>
                        <li class="job-item">
                            <span class="job-role" style="font-size: 1.15rem;">Sales Executive</span>
                            <span class="job-openings badge">3 Openings</span>
                        </li>
                    </ul>

                    <div style="margin-top: 3rem; text-align: center;">
                        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Don't see a role that fits? Send us
                            your resume anyway!</p>
                        <a href="mailto:careers@nuraeye.com" class="btn btn-primary">Email Resume</a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Footer Section -->
    <!-- Footer Component -->
    <app-footer base-path=".."></app-footer>

    <!-- Custom JS -->
    <script src="../js/script.js"></script>
</body>

</html>
